<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡龙 - Bubble Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .game-container {
            position: relative;
            background: linear-gradient(180deg, #1e3a5f 0%, #0d1b2a 60%, #1b2838 100%);
            border-radius: 20px;
            box-shadow:
                0 0 60px rgba(100, 180, 255, 0.3),
                0 0 120px rgba(100, 150, 255, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            margin-bottom: 10px;
        }

        .score-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 10px 25px;
            color: #fff;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8ecae6;
        }

        .score-value {
            font-size: 32px;
            font-weight: bold;
            color: #ffd60a;
            text-shadow: 0 0 20px rgba(255, 214, 10, 0.5);
        }

        .next-bubble-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 10px 20px;
            color: #fff;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .next-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8ecae6;
            margin-bottom: 5px;
        }

        #nextBubble {
            display: inline-block;
        }

        .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(238, 90, 36, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(238, 90, 36, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        canvas {
            display: block;
            border-radius: 10px;
            cursor: crosshair;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .game-over-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .game-over-score {
            font-size: 24px;
            color: #ffd60a;
        }

        .combo-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ffd60a;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 15px rgba(255, 214, 10, 0.8);
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1.5);
            }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: particleBurst 0.8s ease-out forwards;
        }

        @keyframes particleBurst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0);
            }
        }

        .instructions {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="game-header">
            <div class="score-container">
                <div class="score-label">得分</div>
                <div class="score-value" id="score">0</div>
            </div>
            <button class="btn" id="restartBtn">重新开始</button>
            <div class="next-bubble-container">
                <div class="next-label">下一个</div>
                <div id="nextBubble"></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="game-over-overlay" id="gameOverOverlay">
            <div class="game-over-title" id="gameOverTitle">游戏结束</div>
            <div class="game-over-score" id="gameOverScore">得分: 0</div>
            <button class="btn" id="playAgainBtn">再来一局</button>
        </div>
        <div class="instructions">
            🖱️ 移动鼠标瞄准 · 点击发射泡泡 · 匹配3个同色泡泡消除
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreElement = document.getElementById('score');
            const nextBubbleDiv = document.getElementById('nextBubble');
            const gameOverOverlay = document.getElementById('gameOverOverlay');
            const gameOverScore = document.getElementById('gameOverScore');
            const gameOverTitle = document.getElementById('gameOverTitle');
            const gameContainer = document.getElementById('gameContainer');

            // Game constants
            const COLS = 12;
            const ROWS = 12;
            const BUBBLE_RADIUS = 18;
            const BUBBLE_DIAMETER = BUBBLE_RADIUS * 2;
            const SHOOTER_Y_OFFSET = 50;
            const COLORS = [
                '#ff6b6b', // 红
                '#ffd93d', // 黄
                '#6bcb77', // 绿
                '#4d96ff', // 蓝
                '#ff922b', // 橙
                '#cc5de8', // 紫
            ];

            let grid = [];
            let shooterBubble = null;
            let nextBubble = null;
            let bubbleX, bubbleY;
            let bubbleVX, bubbleVY;
            let isShooting = false;
            let score = 0;
            let comboCount = 0;
            let mouseX = canvas.width / 2;
            let animationId = null;
            let gameRunning = true;

            // Set canvas size
            const GRID_OFFSET_X = 20;
            const GRID_OFFSET_Y = 30;
            canvas.width = COLS * BUBBLE_DIAMETER + GRID_OFFSET_X * 2;
            canvas.height = ROWS * BUBBLE_DIAMETER + GRID_OFFSET_Y + SHOOTER_Y_OFFSET + 40;

            const SHOOTER_X = canvas.width / 2;
            const SHOOTER_Y = canvas.height - SHOOTER_Y_OFFSET;
            const GRID_BOTTOM = canvas.height - SHOOTER_Y_OFFSET - 30;

            function getGridX(col, row) {
                const offset = (row % 2 === 0) ? 0 : BUBBLE_RADIUS;
                return GRID_OFFSET_X + col * BUBBLE_DIAMETER + BUBBLE_RADIUS + offset;
            }

            function getGridY(row) {
                return GRID_OFFSET_Y + row * BUBBLE_DIAMETER + BUBBLE_RADIUS;
            }

            function randomColor() {
                return COLORS[Math.floor(Math.random() * COLORS.length)];
            }

            function createBubble(color) {
                return { color, active: true };
            }

            function initGrid() {
                grid = [];
                const startRows = 5;
                for (let row = 0; row < ROWS; row++) {
                    grid[row] = [];
                    const colsInRow = (row % 2 === 0) ? COLS : COLS - 1;
                    for (let col = 0; col < COLS; col++) {
                        if (row < startRows && col < colsInRow) {
                            grid[row][col] = createBubble(randomColor());
                        } else {
                            grid[row][col] = null;
                        }
                    }
                }
            }

            function getBubbleAt(col, row) {
                if (row < 0 || row >= ROWS) return null;
                if (col < 0 || col >= COLS) return null;
                return grid[row][col];
            }

            function isPositionValid(col, row) {
                if (row < 0 || row >= ROWS) return false;
                const colsInRow = (row % 2 === 0) ? COLS : COLS - 1;
                if (col < 0 || col >= colsInRow) return false;
                return true;
            }

            function getNeighbors(col, row) {
                const neighbors = [];
                const isEvenRow = row % 2 === 0;

                const offsets = isEvenRow ? [
                    [-1, 1], [0, 1],   // 左下, 右下
                    [-1, 0], [1, 0],    // 左, 右
                    [-1, -1], [0, -1],  // 左上, 右上
                ] : [
                    [0, 1], [1, 1],     // 左下, 右下
                    [-1, 0], [1, 0],    // 左, 右
                    [0, -1], [1, -1],   // 左上, 右上
                ];

                for (const [dc, dr] of offsets) {
                    const nc = col + dc;
                    const nr = row + dr;
                    if (isPositionValid(nc, nr)) {
                        neighbors.push({ col: nc, row: nr });
                    }
                }
                return neighbors;
            }

            function findConnected(col, row, color) {
                const toRemove = new Set();
                const visited = new Set();
                const queue = [{ col, row }];
                visited.add(`${col},${row}`);

                while (queue.length > 0) {
                    const current = queue.shift();
                    const bubble = getBubbleAt(current.col, current.row);
                    if (bubble && bubble.active && bubble.color === color) {
                        toRemove.add(`${current.col},${current.row}`);
                        for (const n of getNeighbors(current.col, current.row)) {
                            const key = `${n.col},${n.row}`;
                            if (!visited.has(key)) {
                                visited.add(key);
                                queue.push(n);
                            }
                        }
                    }
                }

                return toRemove;
            }

            function findFloating() {
                const connected = new Set();
                const queue = [];

                // BFS from all bubbles in row 0
                for (let col = 0; col < COLS; col++) {
                    const bubble = getBubbleAt(col, 0);
                    if (bubble && bubble.active) {
                        const key = `${col},0`;
                        if (!connected.has(key)) {
                            connected.add(key);
                            queue.push({ col, row: 0 });
                        }
                    }
                }

                while (queue.length > 0) {
                    const current = queue.shift();
                    for (const n of getNeighbors(current.col, current.row)) {
                        const key = `${n.col},${n.row}`;
                        const bubble = getBubbleAt(n.col, n.row);
                        if (bubble && bubble.active && !connected.has(key)) {
                            connected.add(key);
                            queue.push(n);
                        }
                    }
                }

                // All active bubbles not in 'connected' are floating
                const floating = [];
                for (let row = 0; row < ROWS; row++) {
                    const colsInRow = (row % 2 === 0) ? COLS : COLS - 1;
                    for (let col = 0; col < colsInRow; col++) {
                        const bubble = getBubbleAt(col, row);
                        if (bubble && bubble.active && !connected.has(`${col},${row}`)) {
                            floating.push({ col, row });
                        }
                    }
                }
                return floating;
            }

            function createParticles(x, y, color) {
                const rect = canvas.getBoundingClientRect();
                const containerRect = gameContainer.getBoundingClientRect();
                const offsetX = rect.left - containerRect.left + 20;
                const offsetY = rect.top - containerRect.top + 20;

                for (let i = 0; i < 12; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const angle = (Math.PI * 2 * i) / 12;
                    const distance = 30 + Math.random() * 40;
                    particle.style.cssText = `
                        left: ${offsetX + x}px;
                        top: ${offsetY + y}px;
                        width: 8px;
                        height: 8px;
                        background: ${color};
                        --dx: ${Math.cos(angle) * distance}px;
                        --dy: ${Math.sin(angle) * distance}px;
                    `;
                    gameContainer.appendChild(particle);
                    setTimeout(() => particle.remove(), 800);
                }
            }

            function showCombo(x, y, text) {
                const rect = canvas.getBoundingClientRect();
                const containerRect = gameContainer.getBoundingClientRect();
                const comboEl = document.createElement('div');
                comboEl.className = 'combo-text';
                comboEl.textContent = text;
                comboEl.style.cssText = `
                    left: ${rect.left - containerRect.left + x + 20}px;
                    top: ${rect.top - containerRect.top + y + 20}px;
                `;
                gameContainer.appendChild(comboEl);
                setTimeout(() => comboEl.remove(), 1000);
            }

            function removeBubbles(bubbleSet) {
                let removed = 0;
                for (const key of bubbleSet) {
                    const [col, row] = key.split(',').map(Number);
                    const bubble = getBubbleAt(col, row);
                    if (bubble) {
                        const pos = { x: getGridX(col, row), y: getGridY(row) };
                        createParticles(pos.x, pos.y, bubble.color);
                        grid[row][col] = null;
                        removed++;
                    }
                }
                return removed;
            }

            function snapBubbleToGrid() {
                let bestCol = -1;
                let bestRow = -1;
                let bestDist = Infinity;

                for (let row = 0; row < ROWS; row++) {
                    const colsInRow = (row % 2 === 0) ? COLS : COLS - 1;
                    for (let col = 0; col < colsInRow; col++) {
                        if (grid[row][col] && grid[row][col].active) continue;

                        const gx = getGridX(col, row);
                        const gy = getGridY(row);
                        const dx = bubbleX - gx;
                        const dy = bubbleY - gy;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < BUBBLE_DIAMETER * 0.8 && dist < bestDist) {
                            bestDist = dist;
                            bestCol = col;
                            bestRow = row;
                        }
                    }
                }

                if (bestRow >= 0) {
                    grid[bestRow][bestCol] = createBubble(shooterBubble.color);

                    // Find connected bubbles of same color
                    const connected = findConnected(bestCol, bestRow, shooterBubble.color);

                    let pointsEarned = 0;
                    let comboText = '';

                    if (connected.size >= 3) {
                        const removed = removeBubbles(connected);
                        pointsEarned = removed * 10;
                        comboCount++;

                        if (comboCount >= 5) comboText = '🔥 超级连击!';
                        else if (comboCount >= 3) comboText = '✨ 连击!';
                        else if (connected.size >= 6) comboText = '💥 大消除!';
                        else comboText = '👍 消除!';

                        // Show combo at snap position
                        showCombo(getGridX(bestCol, bestRow), getGridY(bestRow), comboText);

                        // Find and remove floating bubbles
                        const floating = findFloating();
                        if (floating.length > 0) {
                            for (const { col, row } of floating) {
                                const b = getBubbleAt(col, row);
                                if (b) {
                                    createParticles(getGridX(col, row), getGridY(row), b.color);
                                    grid[row][col] = null;
                                }
                            }
                            pointsEarned += floating.length * 20;
                            showCombo(
                                getGridX(floating[0].col, floating[0].row),
                                getGridY(floating[0].row) - 20,
                                `🌟 掉落 +${floating.length * 20}!`
                            );
                        }

                        if (connected.size >= 8) {
                            pointsEarned += 50;
                        }
                    } else {
                        comboCount = 0;
                    }

                    score += pointsEarned;
                    updateScore();
                    checkGameOver();
                }

                return bestRow >= 0;
            }

            function checkGameOver() {
                // Check if any bubble has reached the bottom rows
                for (let row = ROWS - 3; row < ROWS; row++) {
                    const colsInRow = (row % 2 === 0) ? COLS : COLS - 1;
                    for (let col = 0; col < colsInRow; col++) {
                        if (grid[row][col] && grid[row][col].active) {
                            endGame(false);
                            return;
                        }
                    }
                }

                // Check win condition - no bubbles left
                let hasBubbles = false;
                for (let row = 0; row < ROWS; row++) {
                    const colsInRow = (row % 2 === 0) ? COLS : COLS - 1;
                    for (let col = 0; col < colsInRow; col++) {
                        if (grid[row][col] && grid[row][col].active) {
                            hasBubbles = true;
                            break;
                        }
                    }
                    if (hasBubbles) break;
                }
                if (!hasBubbles) {
                    endGame(true);
                }
            }

            function endGame(won) {
                gameRunning = false;
                gameOverTitle.textContent = won ? '🎉 恭喜通关!' : '💀 游戏结束';
                gameOverTitle.style.color = won ? '#6bcb77' : '#ff6b6b';
                gameOverScore.textContent = `最终得分: ${score}`;
                gameOverOverlay.classList.add('active');
            }

            function updateScore() {
                scoreElement.textContent = score;
            }

            function shootBubble(targetX, targetY) {
                if (isShooting || !gameRunning) return;

                const dx = targetX - SHOOTER_X;
                const dy = targetY - SHOOTER_Y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const speed = 12;

                bubbleVX = (dx / dist) * speed;
                bubbleVY = (dy / dist) * speed;
                bubbleX = SHOOTER_X;
                bubbleY = SHOOTER_Y;
                isShooting = true;
            }

            function updateBubble() {
                if (!isShooting) return;

                bubbleX += bubbleVX;
                bubbleY += bubbleVY;

                // Wall bouncing
                if (bubbleX - BUBBLE_RADIUS <= 0) {
                    bubbleX = BUBBLE_RADIUS;
                    bubbleVX = Math.abs(bubbleVX);
                }
                if (bubbleX + BUBBLE_RADIUS >= canvas.width) {
                    bubbleX = canvas.width - BUBBLE_RADIUS;
                    bubbleVX = -Math.abs(bubbleVX);
                }

                // Hit ceiling or other bubbles
                if (bubbleY - BUBBLE_RADIUS <= GRID_OFFSET_Y) {
                    bubbleY = GRID_OFFSET_Y + BUBBLE_RADIUS;
                    const snapped = snapBubbleToGrid();
                    if (!snapped) {
                        // Place at nearest valid position in top row
                        placeBubbleAtTop();
                    }
                    isShooting = false;
                    nextTurn();
                    return;
                }

                // Check collision with existing bubbles
                for (let row = 0; row < ROWS; row++) {
                    const colsInRow = (row % 2 === 0) ? COLS : COLS - 1;
                    for (let col = 0; col < colsInRow; col++) {
                        if (grid[row][col] && grid[row][col].active) {
                            const gx = getGridX(col, row);
                            const gy = getGridY(row);
                            const dx = bubbleX - gx;
                            const dy = bubbleY - gy;
                            const dist = Math.sqrt(dx * dx + dy * dy);

                            if (dist < BUBBLE_DIAMETER) {
                                // Place bubble adjacent to the hit bubble
                                const snapped = snapBubbleToGrid();
                                if (!snapped) {
                                    placeBubbleAtTop();
                                }
                                isShooting = false;
                                nextTurn();
                                return;
                            }
                        }
                    }
                }

                // Fell off bottom
                if (bubbleY - BUBBLE_RADIUS > canvas.height) {
                    isShooting = false;
                    nextTurn();
                }
            }

            function placeBubbleAtTop() {
                // Find the closest valid grid position near where it hit
                let bestCol = 0;
                let bestRow = 0;
                let bestDist = Infinity;

                for (let row = 0; row < ROWS; row++) {
                    const colsInRow = (row % 2 === 0) ? COLS : COLS - 1;
                    for (let col = 0; col < colsInRow; col++) {
                        if (!grid[row][col] || !grid[row][col].active) {
                            const gx = getGridX(col, row);
                            const gy = getGridY(row);
                            const dx = bubbleX - gx;
                            const dy = bubbleY - gy;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < bestDist) {
                                bestDist = dist;
                                bestCol = col;
                                bestRow = row;
                            }
                        }
                    }
                }

                grid[bestRow][bestCol] = createBubble(shooterBubble.color);
                const connected = findConnected(bestCol, bestRow, shooterBubble.color);
                if (connected.size >= 3) {
                    const removed = removeBubbles(connected);
                    score += removed * 10;
                    updateScore();
                }
                checkGameOver();
            }

            function nextTurn() {
                shooterBubble = nextBubble;
                nextBubble = createBubble(randomColor());
                updateNextBubbleDisplay();
                comboCount = Math.max(0, comboCount - 1);
            }

            function updateNextBubbleDisplay() {
                if (!nextBubble) return;
                nextBubbleDiv.innerHTML = `
                    <svg width="36" height="36">
                        <circle cx="18" cy="18" r="16" fill="${nextBubble.color}" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                        <circle cx="12" cy="11" r="5" fill="rgba(255,255,255,0.25)"/>
                    </svg>
                `;
            }

            function drawShooterBubble() {
                if (!shooterBubble) return;
                const x = isShooting ? bubbleX : SHOOTER_X;
                const y = isShooting ? bubbleY : SHOOTER_Y;
                drawBubble(x, y, shooterBubble.color, true);
            }

            function drawAimLine() {
                if (isShooting || !gameRunning || !shooterBubble) return;

                const dx = mouseX - SHOOTER_X;
                const dy = -(canvas.height - SHOOTER_Y);
                const angle = Math.atan2(dy, dx);

                // Draw dotted aim line
                ctx.save();
                ctx.setLineDash([4, 6]);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(SHOOTER_X, SHOOTER_Y - BUBBLE_RADIUS);
                const lineLength = 120;
                ctx.lineTo(
                    SHOOTER_X + Math.cos(angle) * lineLength,
                    SHOOTER_Y - BUBBLE_RADIUS + Math.sin(angle) * lineLength
                );
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();

                // Draw bounce preview on walls
                const previewSteps = 60;
                let px = SHOOTER_X;
                let py = SHOOTER_Y;
                let vx = Math.cos(angle) * 1;
                let vy = Math.sin(angle) * 1;

                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                for (let i = 0; i < previewSteps; i++) {
                    px += vx * 3;
                    py += vy * 3;
                    if (px - BUBBLE_RADIUS <= 0 || px + BUBBLE_RADIUS >= canvas.width) {
                        vx = -vx;
                    }
                    if (i % 4 === 0) {
                        ctx.beginPath();
                        ctx.arc(px, py, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    if (py < GRID_OFFSET_Y) break;
                }
            }

            function drawBubble(x, y, color, highlight = false) {
                ctx.save();

                // Shadow
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                // Main bubble
                const gradient = ctx.createRadialGradient(
                    x - BUBBLE_RADIUS * 0.3, y - BUBBLE_RADIUS * 0.3, BUBBLE_RADIUS * 0.1,
                    x, y, BUBBLE_RADIUS
                );
                gradient.addColorStop(0, lightenColor(color, 40));
                gradient.addColorStop(0.7, color);
                gradient.addColorStop(1, darkenColor(color, 30));

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, BUBBLE_RADIUS - 1, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowColor = 'transparent';

                // Border
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Highlight
                if (highlight) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.beginPath();
                    ctx.arc(x - BUBBLE_RADIUS * 0.35, y - BUBBLE_RADIUS * 0.35,
                        BUBBLE_RADIUS * 0.35, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.beginPath();
                    ctx.arc(x - BUBBLE_RADIUS * 0.25, y - BUBBLE_RADIUS * 0.3,
                        BUBBLE_RADIUS * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            function lightenColor(hex, percent) {
                const num = parseInt(hex.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.min(255, (num >> 16) + amt);
                const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
                const B = Math.min(255, (num & 0x0000FF) + amt);
                return `rgb(${R}, ${G}, ${B})`;
            }

            function darkenColor(hex, percent) {
                const num = parseInt(hex.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.max(0, (num >> 16) - amt);
                const G = Math.max(0, ((num >> 8) & 0x00FF) - amt);
                const B = Math.max(0, (num & 0x0000FF) - amt);
                return `rgb(${R}, ${G}, ${B})`;
            }

            function drawGrid() {
                for (let row = 0; row < ROWS; row++) {
                    const colsInRow = (row % 2 === 0) ? COLS : COLS - 1;
                    for (let col = 0; col < colsInRow; col++) {
                        const bubble = grid[row][col];
                        if (bubble && bubble.active) {
                            const x = getGridX(col, row);
                            const y = getGridY(row);
                            drawBubble(x, y, bubble.color);
                        }
                    }
                }
            }

            function drawBackground() {
                // Ceiling line
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(GRID_OFFSET_X - 5, GRID_OFFSET_Y + BUBBLE_RADIUS + 10);
                ctx.lineTo(canvas.width - GRID_OFFSET_X + 5, GRID_OFFSET_Y + BUBBLE_RADIUS + 10);
                ctx.stroke();

                // Shooter platform
                const platY = SHOOTER_Y + BUBBLE_RADIUS + 5;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.beginPath();
                ctx.ellipse(SHOOTER_X, platY, BUBBLE_RADIUS * 2.5, BUBBLE_RADIUS * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Background
                ctx.fillStyle = 'rgba(13, 27, 42, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                drawBackground();
                drawGrid();
                drawAimLine();
                drawShooterBubble();
            }

            function gameLoop() {
                updateBubble();
                draw();
                animationId = requestAnimationFrame(gameLoop);
            }

            function resetGame() {
                score = 0;
                comboCount = 0;
                isShooting = false;
                gameRunning = true;
                updateScore();
                initGrid();
                shooterBubble = createBubble(randomColor());
                nextBubble = createBubble(randomColor());
                updateNextBubbleDisplay();
                bubbleX = SHOOTER_X;
                bubbleY = SHOOTER_Y;
                gameOverOverlay.classList.remove('active');
            }

            // Event handlers
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
            });

            canvas.addEventListener('click', (e) => {
                if (!gameRunning || isShooting) return;
                const rect = canvas.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;

                // Only shoot upward
                if (clickY < SHOOTER_Y) {
                    shootBubble(clickX, clickY);
                }
            });

            // Touch support
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                mouseX = e.touches[0].clientX - rect.left;
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (!gameRunning || isShooting) return;
                const rect = canvas.getBoundingClientRect();
                const touchY = e.changedTouches[0].clientY - rect.top;

                if (touchY < SHOOTER_Y) {
                    shootBubble(mouseX, touchY);
                }
            });

            document.getElementById('restartBtn').addEventListener('click', resetGame);
            document.getElementById('playAgainBtn').addEventListener('click', resetGame);

            // Initialize and start
            resetGame();
            gameLoop();
        })();
    </script>
</body>
</html>
